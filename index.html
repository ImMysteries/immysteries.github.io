<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, minimal-ui">
    <meta name="theme-color" content="#0b0d17">
    <title>mysteries.</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --wip-content: "working on things";
            --wip-letter-spacing: 0.6rem;
            --star-color: #ffffff;
            --icon-opacity: 0.5;
            --bg-top: #0b0d17;
            --bg-mid: #070912;
            --bg-bottom: #0e111d;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            background: linear-gradient(to bottom, var(--bg-top) 0%, var(--bg-mid) 55%, var(--bg-bottom) 100%);
            background-color: #0b0d17;
            background-attachment: scroll;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .nav-container {
            position: absolute;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .nav-link {
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: var(--icon-opacity);
            display: flex;
            align-items: center;
            padding: 10px;
        }

        .nav-link:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        .nav-link svg {
            fill: var(--star-color);
            width: 30px;
            height: 30px;
        }

        .stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: var(--star-color);
            border-radius: 50%;
            animation: twinkle linear infinite;
        }

        .shooting-star {
            position: absolute;
            height: 2px;
            width: 0;
            opacity: 0;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.9), var(--star-color));
            border-radius: 999px;
            pointer-events: none;
            z-index: 1;
            box-shadow: 0 0 15px var(--star-color);
            will-change: transform, width, opacity, filter;
        }

        .wip-text {
            animation: float 40s cubic-bezier(0.37, 0, 0.63, 1) infinite;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .wip-text::after {
            content: var(--wip-content);
            color: var(--star-color);
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: var(--wip-letter-spacing);
            text-transform: uppercase;
            display: block;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.3);
                box-shadow: 0 0 8px 1px rgba(255, 255, 255, 0.4);
            }
        }

        @keyframes shooting-anim {
            0% {
                transform: rotate(var(--angle)) translateX(0) scale(1);
                width: 0;
                opacity: 0;
                filter: blur(0px);
            }

            10% {
                opacity: 1;
                width: 150px;
            }

            70% {
                opacity: 1;
                filter: blur(0px);
            }

            100% {
                transform: rotate(var(--angle)) translateX(1500px) scale(0);
                width: 180px;
                opacity: 0;
                filter: blur(4px);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(30px, -20px) rotate(1deg);
            }

            66% {
                transform: translate(-25px, 20px) rotate(-1deg);
            }
        }
    </style>
</head>

<body>

    <div class="stars-container" id="stars-container"></div>
    <div class="wip-text"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const starsContainer = document.getElementById('stars-container');

            const numStars = 110;
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                const size = Math.random() * 1.8 + 0.5;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.animationDuration = `${Math.random() * 3 + 2}s`;
                star.style.animationDelay = `${Math.random() * -5}s`;
                starsContainer.appendChild(star);
            }

            function createShootingStar() {
                const star = document.createElement('div');
                star.classList.add('shooting-star');

                const isLeftToRight = Math.random() > 0.5;
                const startTop = Math.random() * 65;

                if (isLeftToRight) {
                    star.style.left = '-400px';
                    star.style.setProperty('--angle', '34deg');
                } else {
                    star.style.right = '-400px';
                    star.style.setProperty('--angle', '146deg');
                }

                star.style.top = `${startTop}%`;

                const duration = Math.random() * 0.45 + 1.15;

                star.style.animation = `shooting-anim ${duration}s ease-out forwards`;

                document.body.appendChild(star);

                setTimeout(() => star.remove(), duration * 1000 + 150);

                const nextShot = Math.random() * 5800 + 4800;
                setTimeout(createShootingStar, nextShot);
            }

            setTimeout(createShootingStar, 2800);
        });
    </script>
</body>

</html>
